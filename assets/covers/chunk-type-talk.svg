<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="630" viewBox="0 0 400 630" role="img" aria-label="">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d4f62"/>
      <stop offset="55%" stop-color="#2c3a4a"/>
      <stop offset="100%" stop-color="#1e2833"/>
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e4dc"/>
      <stop offset="100%" stop-color="#b8b0a4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="630" fill="url(#bg)"/>
  <!-- Grid hint -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5" fill="none">
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="0" y1="420" x2="400" y2="420"/>
  </g>
  <!-- Stylized studio microphone -->
  <g filter="url(#soft)" transform="translate(200 240)">
    <!-- Stand -->
    <path d="M -6 280 L -6 120 L 6 120 L 6 280 Z" fill="url(#mic)" opacity="0.85"/>
    <ellipse cx="0" cy="290" rx="42" ry="10" fill="#1a222c" opacity="0.5"/>
    <rect x="-38" y="118" width="76" height="14" rx="4" fill="#2a3542"/>
    <!-- Grille head -->
    <ellipse cx="0" cy="0" rx="52" ry="72" fill="url(#mic)" stroke="#8a8278" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="44" ry="62" fill="none" stroke="#6a6258" stroke-width="0.6" opacity="0.5"/>
    <!-- Horizontal bands -->
    <g stroke="#5c544c" stroke-width="0.45" opacity="0.45" fill="none">
      <ellipse cx="0" cy="-28" rx="40" ry="10"/>
      <ellipse cx="0" cy="0" rx="44" ry="11"/>
      <ellipse cx="0" cy="28" rx="40" ry="10"/>
    </g>
    <!-- Mesh dots -->
    <g fill="#4a433c" opacity="0.35">
      <circle cx="-18" cy="-35" r="1.8"/><circle cx="0" cy="-38" r="1.8"/><circle cx="18" cy="-35" r="1.8"/>
      <circle cx="-22" cy="-12" r="1.8"/><circle cx="0" cy="-15" r="1.8"/><circle cx="22" cy="-12" r="1.8"/>
      <circle cx="-24" cy="12" r="1.8"/><circle cx="0" cy="8" r="1.8"/><circle cx="24" cy="12" r="1.8"/>
      <circle cx="-18" cy="35" r="1.8"/><circle cx="0" cy="38" r="1.8"/><circle cx="18" cy="35" r="1.8"/>
    </g>
    <!-- Shock mount ring -->
    <ellipse cx="0" cy="-78" rx="58" ry="16" fill="none" stroke="#9a9288" stroke-width="1.4" opacity="0.6"/>
    <path d="M -40 -78 Q 0 -95 40 -78" fill="none" stroke="#7a7268" stroke-width="0.8" opacity="0.4"/>
  </g>
  <text x="200" y="580" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="0.28em">GESPR�CH</text>
</svg>
