<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="630" viewBox="0 0 400 630" role="img" aria-label="">
  <defs>
    <linearGradient id="ebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3f38"/>
      <stop offset="50%" stop-color="#352e28"/>
      <stop offset="100%" stop-color="#221c18"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4bdb4"/>
      <stop offset="100%" stop-color="#7a7268"/>
    </linearGradient>
    <linearGradient id="key" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2622"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
  </defs>
  <rect width="400" height="630" fill="url(#ebg)"/>
  <g opacity="0.07" stroke="#fff" stroke-width="0.4" fill="none">
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
  </g>
  <!-- Vintage typewriter body -->
  <g transform="translate(200 270)">
    <!-- Base -->
    <path d="M -120 140 L -130 165 L 130 165 L 120 140 Z" fill="#1a1614"/>
    <rect x="-115" y="55" width="230" height="90" rx="6" fill="#2a2420" stroke="#1a1410" stroke-width="1"/>
    <!-- Keyboard well -->
    <rect x="-100" y="70" width="200" height="58" rx="4" fill="#181410"/>
    <!-- Key rows (simplified) -->
    <g fill="url(#key)" stroke="#3a342e" stroke-width="0.4">
      <rect x="-88" y="78" width="18" height="14" rx="2"/><rect x="-64" y="78" width="18" height="14" rx="2"/>
      <rect x="-40" y="78" width="18" height="14" rx="2"/><rect x="-16" y="78" width="18" height="14" rx="2"/>
      <rect x="8" y="78" width="18" height="14" rx="2"/><rect x="32" y="78" width="18" height="14" rx="2"/>
      <rect x="56" y="78" width="18" height="14" rx="2"/><rect x="70" y="78" width="18" height="14" rx="2"/>
      <rect x="-80" y="98" width="22" height="14" rx="2"/><rect x="-52" y="98" width="22" height="14" rx="2"/>
      <rect x="-24" y="98" width="22" height="14" rx="2"/><rect x="4" y="98" width="22" height="14" rx="2"/>
      <rect x="32" y="98" width="22" height="14" rx="2"/><rect x="60" y="98" width="22" height="14" rx="2"/>
    </g>
    <!-- Paper / platen area -->
    <rect x="-95" y="-35" width="190" height="75" rx="4" fill="url(#metal)" stroke="#5a5248" stroke-width="1"/>
    <rect x="-78" y="-22" width="156" height="48" rx="1" fill="#f5f2ea"/>
    <!-- Typed lines -->
    <g fill="none" stroke="#3a3630" stroke-width="1.2" stroke-linecap="round" opacity="0.35">
      <line x1="-65" y1="-8" x2="55" y2="-8"/><line x1="-65" y1="4" x2="40" y2="4"/><line x1="-65" y1="16" x2="65" y2="16"/>
    </g>
    <!-- Carriage return lever hint -->
    <path d="M 95 5 L 118 -8 L 115 -2 L 98 8 Z" fill="#6a6258" opacity="0.85"/>
    <!-- Ribbon cover -->
    <ellipse cx="0" cy="-55" rx="88" ry="22" fill="#3a342e" stroke="#2a2018" stroke-width="1"/>
  </g>
  <text x="200" y="580" text-anchor="middle" fill="rgba(255,255,255,0.32)" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="0.22em">ESSAY</text>
</svg>
